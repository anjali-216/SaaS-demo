name: CI

on:
  push:
    branches:
      - "**"

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            market-service/package-lock.json
            web-ui/package-lock.json

      - name: Install dependencies (market-service)
        working-directory: market-service
        run: npm ci

      - name: Install dependencies (web-ui)
        working-directory: web-ui
        run: npm ci

      - name: Basic code validation (market-service)
        run: node --check market-service/src/server.js

      - name: Basic code validation (web-ui)
        run: node --check web-ui/server.js

      - name: Build Docker image (market-service)
        run: docker build -t market-service:ci ./market-service

      - name: Build Docker image (web-ui)
        run: docker build -t web-ui:ci ./web-ui

