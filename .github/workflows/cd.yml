name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-versioned-images:
    runs-on: ubuntu-latest
    env:
      VERSION: v0.1.${{ github.run_number }}
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push market-service image
        uses: docker/build-push-action@v6
        with:
          context: ./market-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-demo-market-service:${{ env.VERSION }}

      - name: Build and push web-ui image
        uses: docker/build-push-action@v6
        with:
          context: ./web-ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/saas-demo-web-ui:${{ env.VERSION }}

      - name: Show generated version
        run: echo "Published version $VERSION"
